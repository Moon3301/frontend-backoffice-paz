<div class="surface-card p-5 shadow-2 border-round w-full">
    <div class="mb-4">
        <div class="text-xl font-bold text-paz-white mb-2 uppercase">CARÁTULAS GENERADAS</div>
        <p class="text-500 text-sm m-0">Gestión y descarga de documentos generados.</p>
    </div>

    <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="mb-5">
        <div class="flex flex-column md:flex-row gap-4">
            <div class="field flex-1 mb-0">
                <label class="block font-medium text-500 text-sm mb-2 font-bold uppercase">Número de Carátula</label>
                <div class="p-input-icon-left w-full">
                    <input pInputText type="text" formControlName="numeroCaratula" placeholder="Buscar por número..." class="w-full" />
                </div>
            </div>

            <div class="field flex-1 mb-0">
                <label class="block font-medium text-500 text-sm mb-2 font-bold uppercase">RUT</label>
                <div class="p-input-icon-left w-full">
                    <input pInputText type="text" formControlName="rut" placeholder="Buscar por RUT..." class="w-full" />
                </div>
            </div>

            <div class="flex align-items-end mb-0 md:w-3">
                <button pButton pRipple type="submit" label="Buscar" icon="pi pi-search" class="w-full p-button-outlined text-900 font-bold"></button>
            </div>
        </div>
    </form>

    <p-table [value]="caratulas" [paginator]="true" [rows]="10" styleClass="p-datatable-sm mt-4 p-datatable-gridlines border-none" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300">ID CARÁTULA</th>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300">RUT ASOCIADO</th>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300">ESTATUS</th>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300">USUARIO</th>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300">FECHA</th>
                <th class="text-500 text-xs uppercase font-bold border-bottom-1 border-300 text-center">ACCIONES</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-caratula>
            <tr class="border-bottom-1 surface-border hover:bg-gray-500">
                <td class="font-bold text-900 py-4">{{caratula.id}}</td>
                <td class="text-600 py-4">{{caratula.rut}}</td>
                <td class="py-4">
                    <p-tag [value]="caratula.estatus" [severity]="getSeverity(caratula.estatus)" [rounded]="true" styleClass="px-3" [style]="caratula.estatus === 'Procesando' ? {'background-color': '#fef08a', 'color': '#854d0e'} : (caratula.estatus === 'Error' ? {'background-color': '#fecaca', 'color': '#991b1b'} : {'background-color': '#bbf7d0', 'color': '#166534'})"></p-tag>
                </td>
                <td class="text-600 py-4">{{caratula.usuario}}</td>
                <td class="text-600 py-4">{{caratula.fecha}}</td>
                <td class="text-center py-4">
                    <button pButton pRipple icon="pi pi-download" class="p-button-rounded p-button-text font-bold text-xl" 
                        [disabled]="caratula.estatus !== 'Generado'" 
                        [ngClass]="{'text-paz-blue': caratula.estatus === 'Generado', 'text-300': caratula.estatus !== 'Generado'}">
                    </button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
