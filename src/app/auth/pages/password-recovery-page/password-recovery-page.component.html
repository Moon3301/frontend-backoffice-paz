<div class="min-h-screen surface-ground flex flex-column align-items-center justify-content-center p-4">

    <!-- Botón de Modo Oscuro / Claro en el Login -->
    <div class="absolute top-0 right-0 p-4">
        <app-theme-toggle [customClass]="'text-color'"></app-theme-toggle>
    </div>
    
    <div class="mb-5 text-center">
        <!-- Replace with actual logo if available -->
        <div class="text-4xl font-bold flex align-items-center justify-content-center text-800">
            <img src="/images/logo-paz.png" alt="Logo" class="mb-3" style="max-width: 100px;">
        </div>
    </div>

    <div class="surface-card p-5 shadow-2 border-round w-full" style="max-width: 450px;">
        <div class="text-center mb-5">
            <div class="text-900 text-2xl font-bold mb-2">Recuperar Contraseña</div>
            <span class="text-600 font-medium text-sm">Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecer tu contraseña.</span>
        </div>

        <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()">
            <div class="field mb-4">
                <label for="email" class="block text-900 font-medium mb-2 text-sm">Correo Electrónico</label>
                <div class="p-input-icon-left w-full">
                    <i class="pi pi-envelope"></i>
                    <input id="email" type="text" formControlName="email" pInputText placeholder="nombre@ejemplo.com" class="w-full" />
                </div>
                <small *ngIf="recoveryForm.get('email')?.invalid && recoveryForm.get('email')?.touched" class="p-error block mt-1">El correo es requerido y debe ser válido.</small>
            </div>

            <button pButton pRipple label="Enviar Enlace" class="w-full p-3 mb-5"></button>

            <div class="text-center border-top-1 surface-border pt-4">
                <a routerLink="/auth/login" class="font-medium no-underline text-primary cursor-pointer text-sm">
                    <i class="pi pi-arrow-left mr-2"></i> Volver al Login
                </a>
            </div>
        </form>
    </div>
    
    <div class="text-center mt-5">
        <span class="text-500 text-sm block w-full">&copy; 2026 Inmobiliaria PAZ. Todos los derechos reservados.</span>
    </div>
</div>
