<div class="min-h-screen surface-ground flex align-items-center justify-content-center p-4">

    <div class="surface-card p-5 shadow-2 border-round w-full" style="max-width: 450px;">
        <div class="text-center mb-5">
            <div class="text-900 text-3xl font-bold mb-2">Bienvenido</div>
            <span class="text-600 font-medium">Ingresa tus credenciales para acceder al sistema.</span>
        </div>

        <form [formGroup]="loginForm"  (ngSubmit)="onSubmit()">
            <div class="field mb-4">
                <label for="email" class="block text-900 font-medium mb-2">Correo Electrónico</label>
                <div class="p-input-icon-left w-full">
                    <i class="pi pi-envelope"></i>
                    <input id="email" type="text" formControlName="email" pInputText placeholder="usuario@paz.cl" class="w-full" />
                </div>
                <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="p-error block mt-1">El correo es requerido y debe ser válido.</small>
            </div>

            <div class="field mb-4">
                <label for="password" class="block text-900 font-medium mb-2">Contraseña</label>
                <div class="p-input-icon-left w-full">
                    <i class="pi pi-lock z-1 relative left-0 text-color-secondary"></i>
                    <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="false" placeholder="••••••••" styleClass="w-full" inputStyleClass="w-full"></p-password>
                </div>
                <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="p-error block mt-1">La contraseña es requerida.</small>
            </div>

            <div class="flex align-items-center justify-content-between mb-5 gap-5">
                <div class="flex align-items-center">
                    <p-checkbox id="rememberme" formControlName="rememberMe" [binary]="true" inputId="rememberme"></p-checkbox>
                    <label for="rememberme" class="ml-2 text-900 font-medium">Recordarme</label>
                </div>
                <a routerLink="/auth/recuperar-contrasena" class="font-medium no-underline ml-2 text-white text-right cursor-pointer">¿Olvidaste tu contraseña?</a>
            </div>

            <button pButton pRipple label="Iniciar Sesión" icon="pi pi-sign-in" class="w-full p-3 text-xl"></button>
        </form>

        <div class="text-center mt-5">
            <span class="text-500 text-sm border-top-1 surface-border pt-4 block w-full">&copy; 2026 Inmobiliaria PAZ. Todos los derechos reservados.</span>
        </div>
    </div>
</div>
